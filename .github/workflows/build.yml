# Multi-platform native library build and publish workflow
#
# This workflow builds LuaJava native libraries for multiple platforms (Linux, Windows, macOS, iOS),
# runs tests across different OS versions, packages the artifacts, and publishes to Maven Central.
#
# Workflow structure:
# 1. x86-natives: Builds Linux (x86, x86_64) and Windows (x86, x86_64, ARM64) natives
# 2. arm64-natives: Builds Linux ARM64 natives natively using QEMU
# 3. arm32-natives: Builds Linux ARM32 natives natively using QEMU
# 4. apple-natives: Builds macOS (x86_64, ARM64) and iOS natives
# 5. linux-testing & windows-testing: Tests natives on different OS versions
# 6. pack-and-publish-natives: Packages all natives and publishes to Maven Central
#
# Triggered by:
# - Completion of "Create Source Artifact" workflow
# - Manual dispatch with run-id parameter (unofficial feature)

name: Docker Build and Publish

on:
  workflow_run:
    workflows: [Create Source Artifact]
    types: [completed]
  workflow_dispatch:
    inputs:
      run-id:
        description: "The run ID of the workflow run that uploaded the luajava-folder artifact."
        required: true
        type: string

jobs:
  # Job 1: Build native libraries for Linux x86/x86_64 and Windows platforms
  # Builds: Linux (x86, x86_64) and Windows (x86, x86_64, ARM64)
  # Uses LLVM-MinGW for Windows builds
  x86-natives:
    runs-on: ubuntu-latest
    container:
      image: quay.io/centos/centos:stream9
      env:
        DEBIAN_FRONTEND: noninteractive
    steps:
      - name: Install basic dependencies
        run: |
          dnf install -y wget git
          dnf install -y gcc gcc-c++ make
          dnf install -y ca-certificates
          dnf install -y unzip xz tar

      - name: Download luajava folder artifact
        uses: actions/download-artifact@v4
        with:
          name: luajava-folder
          path: luajava
          github-token: ${{ github.token }}
          run-id: ${{ inputs.run-id || github.event.workflow_run.id }}

      - name: Set version from artifact
        run: |
          if [ -f luajava/version.txt ]; then
            echo "VERSION=$(cat luajava/version.txt)" >> $GITHUB_ENV
          fi
          if [ -f luajava/maven-group-id.txt ]; then
            echo "MAVEN_GROUP_ID=$(cat luajava/maven-group-id.txt)" >> $GITHUB_ENV
          fi

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'
      - run: echo "JAVA_8=$JAVA_HOME" >> $GITHUB_ENV
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - run: echo "JAVA_17=$JAVA_HOME" >> $GITHUB_ENV

      - name: Install ant
        run: |
          # Install EPEL first
          dnf install -y https://dl.fedoraproject.org/pub/epel/epel-release-latest-9.noarch.rpm
          # Enable CRB (CodeReady Builder) repository for additional packages
          dnf install -y dnf-plugins-core
          dnf config-manager --set-enabled crb
          # Install ant from EPEL
          dnf install -y ant

      - name: Download llvm-mingw
        uses: robinraju/release-downloader@v1.10
        with:
          repository: 'mstorsjo/llvm-mingw'
          tag: 20240619
          fileName: llvm-mingw-20240619-ucrt-ubuntu-20.04-x86_64.tar.xz
          tarBall: false
          zipBall: false
          
      - name: Set up llvm-mingw
        run: |
          mkdir -p /usr/local
          tar -Jxf llvm-mingw-20240619-ucrt-ubuntu-20.04-x86_64.tar.xz -C /usr/local
          echo "/usr/local/llvm-mingw-20240619-ucrt-ubuntu-20.04-x86_64/bin" >> $GITHUB_PATH
          
      - name: Install compilation toolchains
        run: |
          # Install dnf-plugins-core
          dnf install -y dnf-plugins-core

          # x86_64 (native)
          dnf install -y gcc gcc-c++ glibc-devel kernel-headers

          # x86 (32-bit)
          dnf install -y libstdc++-devel.i686 glibc-devel.i686

          # Windows (MinGW cross-compilers)
          dnf install -y mingw64-gcc mingw64-gcc-c++ mingw32-gcc mingw32-gcc-c++ zlib.i686

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        
      - name: Build natives
        run: |
          cd luajava
          chmod +x gradlew
          echo $PATH
          which aarch64-w64-mingw32-gcc || echo "not found"
          ls /usr/local/llvm-mingw-20240619-ucrt-ubuntu-20.04-x86_64/bin
          ./gradlew --info --stacktrace jniGen jnigenBuildLinux jnigenBuildLinux64
          ./gradlew jniGen jnigenBuildWindows jnigenBuildWindows64 jnigenBuildWindowsARM64
          
      - name: Test (Desktop)
        run: |
          cd luajava
          ./gradlew --info --stacktrace :example:test :jsr223:test :jpms-example:run
          
      - name: Jacoco Test Report
        run: |
          cd luajava
          ./gradlew jacocoTestReport
          
      - name: Upload test result
        uses: codecov/codecov-action@v4
        with:
          files: >-
            ./luajava/lua51/build/reports/jacoco/report.xml,
            ./luajava/lua52/build/reports/jacoco/report.xml,
            ./luajava/lua53/build/reports/jacoco/report.xml,
            ./luajava/lua54/build/reports/jacoco/report.xml,
            ./luajava/luajit/build/reports/jacoco/report.xml,
            ./luajava/luaj/build/reports/jacoco/report.xml,
            ./luajava/luajava/build/reports/jacoco/report.xml,
            ./luajava/jsr223/build/reports/jacoco/report.xml
          verbose: true
          
      - name: Upload x86 natives
        uses: actions/upload-artifact@v4
        with:
          name: x86-natives
          path: |
            ./luajava/*/libs
            ./luajava/**/*.jar
          retention-days: 5

  # Job 2: Build ARM64 native libraries
  # Runs natively on ARM64 runner with CentOS Stream 9
  arm64-natives:
    runs-on: ubuntu-latest
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64
      - name: Download luajava folder artifact
        uses: actions/download-artifact@v4
        with:
          name: luajava-folder
          path: luajava
          github-token: ${{ github.token }}
          run-id: ${{ inputs.run-id || github.event.workflow_run.id }}
      - name: Build in CentOS Stream 9 ARM64 container
        run: |
          # Read version from artifact
          VERSION=$(cat luajava/version.txt 2>/dev/null || echo "unknown")
          MAVEN_GROUP_ID=$(cat luajava/maven-group-id.txt 2>/dev/null || echo "unknown")

          docker run --rm --platform linux/arm64 \
            -v $(pwd)/luajava:/workspace \
            -w /workspace \
            -e VERSION="${VERSION}" \
            -e MAVEN_GROUP_ID="${MAVEN_GROUP_ID}" \
            quay.io/centos/centos:stream9 \
            /bin/bash -c "
              dnf install -y java-17-openjdk-devel gcc gcc-c++ make wget unzip
              export JAVA_HOME=/usr/lib/jvm/java-17-openjdk
              chmod +x gradlew
              ./gradlew jniGen jnigenBuildLinuxARM64
            "
      - name: Upload ARM64 natives
        uses: actions/upload-artifact@v4
        with:
          name: arm64-natives
          path: ./luajava/*/libs
          retention-days: 5

  # Job 3: Build ARM32 native libraries
  # Runs natively on ARM32 runner with CentOS Stream 9
  arm32-natives:
    runs-on: ubuntu-latest
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm
      - name: Download luajava folder artifact
        uses: actions/download-artifact@v4
        with:
          name: luajava-folder
          path: luajava
          github-token: ${{ github.token }}
          run-id: ${{ inputs.run-id || github.event.workflow_run.id }}
      - name: Build in CentOS Stream 9 ARM32 container
        run: |
          # Read version from artifact
          VERSION=$(cat luajava/version.txt 2>/dev/null || echo "unknown")
          MAVEN_GROUP_ID=$(cat luajava/maven-group-id.txt 2>/dev/null || echo "unknown")

          docker run --rm --platform linux/arm/v7 \
            -v $(pwd)/luajava:/workspace \
            -w /workspace \
            -e VERSION="${VERSION}" \
            -e MAVEN_GROUP_ID="${MAVEN_GROUP_ID}" \
            quay.io/centos/centos:stream9 \
            /bin/bash -c "
              dnf install -y java-17-openjdk-devel gcc gcc-c++ make wget unzip
              export JAVA_HOME=/usr/lib/jvm/java-17-openjdk
              chmod +x gradlew
              ./gradlew jniGen jnigenBuildLinuxARM
            "
      - name: Upload ARM32 natives
        uses: actions/upload-artifact@v4
        with:
          name: arm32-natives
          path: ./luajava/*/libs
          retention-days: 5

  # Job 4: Build native libraries for Apple platforms
  # Builds: macOS (x86_64, ARM64) and iOS
  apple-natives:
    runs-on: macos-13
    env:
      MACOSX_DEPLOYMENT_TARGET: "10.10"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - run: echo "JAVA_17=$JAVA_HOME" >> $GITHUB_ENV
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Download luajava folder artifact
        uses: actions/download-artifact@v4
        with:
          name: luajava-folder
          path: luajava
          github-token: ${{ github.token }}
          run-id: ${{ inputs.run-id || github.event.workflow_run.id }}
      - name: Set version from artifact
        run: |
          if [ -f luajava/version.txt ]; then
            echo "VERSION=$(cat luajava/version.txt)" >> $GITHUB_ENV
          fi
          if [ -f luajava/maven-group-id.txt ]; then
            echo "MAVEN_GROUP_ID=$(cat luajava/maven-group-id.txt)" >> $GITHUB_ENV
          fi
      - name: Build natives
        run: |
          cd luajava
          chmod +x gradlew
          ./gradlew jniGen jnigenBuildMacOsX64 jnigenBuildMacOsXARM64 jnigenBuildIOS
      - name: Test
        run: |
          cd luajava
          chmod +x gradlew
          ./gradlew :example:test :jsr223:test :jpms-example:run
      - name: Upload macOS natives
        uses: actions/upload-artifact@v4
        with:
          name: apple-natives
          path: ./luajava/*/libs
          retention-days: 5

  # Job 3: Test Linux natives on different glibc/musl versions
  # Tests the built natives on Ubuntu 14.04 (glibc) and Alpine (musl)
  linux-testing:
    runs-on: ubuntu-latest
    needs:
      - x86-natives
      - arm64-natives
      - arm32-natives
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'
      - run: echo "JAVA_8=$JAVA_HOME" >> $GITHUB_ENV
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
      - run: echo "JAVA_11=$JAVA_HOME" >> $GITHUB_ENV
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Download x86 natives artifact
        uses: actions/download-artifact@v4
        with:
          name: x86-natives
          path: luajava
      - name: Download ARM64 natives artifact
        uses: actions/download-artifact@v4
        with:
          name: arm64-natives
          path: luajava
      - name: Download ARM32 natives artifact
        uses: actions/download-artifact@v4
        with:
          name: arm32-natives
          path: luajava
      - name: Download luajava folder artifact
        uses: actions/download-artifact@v4
        with:
          name: luajava-folder
          path: luajava
          github-token: ${{ github.token }}
          run-id: ${{ inputs.run-id || github.event.workflow_run.id }}
      - name: Set version from artifact
        run: |
          if [ -f luajava/version.txt ]; then
            echo "VERSION=$(cat luajava/version.txt)" >> $GITHUB_ENV
          fi
          if [ -f luajava/maven-group-id.txt ]; then
            echo "MAVEN_GROUP_ID=$(cat luajava/maven-group-id.txt)" >> $GITHUB_ENV
          fi
      - name: JniGen
        run: |
          cd luajava
          chmod +x gradlew
          ./gradlew jniGen
      - name: Build example
        run: |
          cd luajava
          chmod +x gradlew
          ./gradlew :example:shadowJar
      - name: Test on CentOS Stream 9
        run: |
          cd luajava
          chmod +x gradlew
          sudo docker build -t ljtest-centos9 -f example/docker/centos9/Dockerfile example/build/libs
          sudo docker run --rm ljtest-centos9

  # Job 4: Test Windows natives
  # Validates the Windows builds work correctly
  windows-testing:
    runs-on: windows-latest
    needs:
      - x86-natives
      - arm64-natives
      - arm32-natives
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'
      - run: echo "JAVA_8=$JAVA_HOME" >> $GITHUB_ENV
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
      - run: echo "JAVA_11=$JAVA_HOME" >> $GITHUB_ENV
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Download x86 natives artifact
        uses: actions/download-artifact@v4
        with:
          name: x86-natives
          path: luajava
      - name: Download ARM64 natives artifact
        uses: actions/download-artifact@v4
        with:
          name: arm64-natives
          path: luajava
      - name: Download ARM32 natives artifact
        uses: actions/download-artifact@v4
        with:
          name: arm32-natives
          path: luajava
      - name: Download luajava folder artifact
        uses: actions/download-artifact@v4
        with:
          name: luajava-folder
          path: luajava
          github-token: ${{ github.token }}
          run-id: ${{ inputs.run-id || github.event.workflow_run.id }}
      - name: Set version from artifact
        shell: pwsh
        run: |
          if (Test-Path luajava/version.txt) {
            $version = Get-Content luajava/version.txt
            echo "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }
          if (Test-Path luajava/maven-group-id.txt) {
            $groupId = Get-Content luajava/maven-group-id.txt
            echo "MAVEN_GROUP_ID=$groupId" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }
      - name: JniGen
        run: |
          cd luajava
          chmod +x gradlew
          ./gradlew jniGen
      - name: Test
        run: |
          cd luajava
          chmod +x gradlew
          ./gradlew --info --stacktrace :example:test :jsr223:test :jpms-example:run

  # Job 5: Package all natives and publish to Maven Central
  # Combines all platform natives, signs them, and publishes:
  # - SNAPSHOT versions to Sonatype Central snapshot repository
  # - Release versions via Sonatype Portal API
  pack-and-publish-natives:
    needs:
      - apple-natives
      - x86-natives
      - arm64-natives
      - arm32-natives
      - windows-testing
      - linux-testing
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '8'
      - run: echo "JAVA_8=$JAVA_HOME" >> $GITHUB_ENV
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'
      - run: echo "JAVA_11=$JAVA_HOME" >> $GITHUB_ENV
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Download apple-natives artifact
        uses: actions/download-artifact@v4
        with:
          name: apple-natives
          path: luajava
      - name: Download x86-natives artifact
        uses: actions/download-artifact@v4
        with:
          name: x86-natives
          path: luajava
      - name: Download arm64-natives artifact
        uses: actions/download-artifact@v4
        with:
          name: arm64-natives
          path: luajava
      - name: Download arm32-natives artifact
        uses: actions/download-artifact@v4
        with:
          name: arm32-natives
          path: luajava
      - name: Download luajava folder artifact
        uses: actions/download-artifact@v4
        with:
          name: luajava-folder
          path: luajava
          github-token: ${{ github.token }}
          run-id: ${{ inputs.run-id || github.event.workflow_run.id }}
      - name: Set version from artifact
        run: |
          if [ -f luajava/version.txt ]; then
            echo "VERSION=$(cat luajava/version.txt)" >> $GITHUB_ENV
          fi
          if [ -f luajava/maven-group-id.txt ]; then
            echo "MAVEN_GROUP_ID=$(cat luajava/maven-group-id.txt)" >> $GITHUB_ENV
          fi
      - name: JniGen
        run: |
          cd luajava
          chmod +x gradlew
          ./gradlew jniGen
      - name: Pack desktop natives
        run: |
          cd luajava
          chmod +x gradlew
          ant -f lua51/jni/build.xml pack-natives
          ant -f lua52/jni/build.xml pack-natives
          ant -f lua53/jni/build.xml pack-natives
          ant -f lua54/jni/build.xml pack-natives
          ant -f luajit/jni/build.xml pack-natives
      - name: Build
        run: |
          cd luajava
          chmod +x gradlew
          ./gradlew build -x test
      - name: Build platform sources JAR
        run: |
          cd luajava
          ./gradlew :lua51:platformSourcesJar
      - name: Publish to local Maven repository
        env:
          GPG_SECKEY: ${{ secrets.INFINISPAN_MAVEN_GPG_ARMORED }}
          GPG_PASSPHRASE: ${{ secrets.INFINISPAN_MAVEN_GPG_PASSPHRASE }}
        run: |
          cd luajava
          ./gradlew :lua51:publishMavenPlatformPublicationToMavenLocal -PpublishOnlyDesktop=true
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: natives
          path: ./luajava/**/build/libs/*-natives-desktop.jar
      - name: Publish to Central Sonatype (for SNAPSHOT)
        # Artifacts will be available at "https://central.sonatype.com/repository/maven-snapshots/"
        if: ${{ (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) && endsWith(env.VERSION, '-SNAPSHOT') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAVEN_USERNAME: ${{ secrets.SONATYPE_CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.SONATYPE_CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.INFINISPAN_MAVEN_GPG_PASSPHRASE }}
          GPG_SECKEY: ${{ secrets.INFINISPAN_MAVEN_GPG_ARMORED }}
          GITHUB_REF: ${{ github.ref }}
        run: |
          cd luajava
          ./gradlew :lua51:publishMavenPlatformPublicationToOSSRHRepository -PpublishOnlyDesktop=true --info --stacktrace -Dorg.gradle.parallel=false
      - name: Publish with Sonatype Portal API (for Release)
        if: ${{ (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) && !endsWith(env.VERSION, '-SNAPSHOT') }}
        env:
          MAVEN_USERNAME: ${{ secrets.SONATYPE_CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.SONATYPE_CENTRAL_PASSWORD }}
        run: |
          # Create base64 token securely without exposing credentials in logs
          TOKEN=$(printf '%s:%s' "${MAVEN_USERNAME}" "${MAVEN_PASSWORD}" | base64 -w 0)
          # Convert group ID to path (e.g., org.infinispan -> org/infinispan)
          GROUP_PATH=$(echo ${MAVEN_GROUP_ID} | tr '.' '/')
          # Add md5 sign
          cd $HOME/.m2/repository/${GROUP_PATH}/infinispan-lua51-platform/${VERSION}
          for f in *.pom *.jar; do
            [ -f "$f" ] || continue       # Skip if no match
            md5sum "$f" | awk '{print $1}' > "$f.md5"
          done
          for f in *.pom *.jar; do
            [ -f "$f" ] || continue       # Skip if no match
            sha1sum "$f" | awk '{print $1}' > "$f.sha1"
          done
          cd $HOME/.m2/repository
          zip -r bundle.zip ${GROUP_PATH}/infinispan-lua51-platform/${VERSION} -x "*.xml"
          curl --request POST \
               --verbose \
               --header "Authorization: Bearer ${TOKEN}" \
               --form bundle=@bundle.zip \
               "https://central.sonatype.com/api/v1/publisher/upload?name=Infinispan%20Lua51%20${VERSION}"